name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  contract:
    name: Contract (Rust / Soroban)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contract
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: contract

      - name: Run contract + registry tests
        run: cargo test --workspace --verbose

      - name: Build release wasm (campaign + registry)
        run: cargo build --workspace --target wasm32-unknown-unknown --release

      - name: Upload wasm artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-wasm
          path: contract/target/wasm32-unknown-unknown/release/*.wasm

  frontend:
    name: Frontend (React / TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test -- --run

      - name: Type-check + build
        run: npm run build
